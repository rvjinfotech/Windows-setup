worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream products_servers {
        server 127.0.0.1:5010;
        server 127.0.0.1:5011;
    }

    upstream orders_servers {
        server 127.0.0.1:5020;
        server 127.0.0.1:5021;
    }

    upstream users_servers {
        server 127.0.0.1:5030;
        server 127.0.0.1:5031;
    }

    server {
        listen       80;
        server_name  _;

        location = / {
            proxy_pass http://products_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location = /products {
            return 301 /products/;
        }

        location /products/ {
            proxy_pass http://products_servers/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location = /orders {
            return 301 /orders/;
        }

        location /orders/ {
            proxy_pass http://orders_servers/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location = /users {
            return 301 /users/;
        }

        location /users/ {
            proxy_pass http://users_servers/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            return 404 "Use /products, /orders, or /users";
        }
    }
}

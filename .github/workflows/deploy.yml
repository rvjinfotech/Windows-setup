name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Manual trigger for ad-hoc deployments
  

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AK }}
          aws-secret-access-key: ${{ secrets.SAK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to all instances
        run: |
          wait_for_ssm() {
            local CMD_ID=$1
            local INSTANCE_ID=$2
            local MAX_WAIT=600
            local ELAPSED=0
            
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" --query "Status" --output text --region $AWS_REGION 2>/dev/null || echo "Pending")
              echo "  $STATUS (${ELAPSED}s)"
              [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]] && break
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
            
            if [ "$STATUS" != "Success" ]; then
              echo "--- Stdout ---"
              aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" --query "StandardOutputContent" --output text --region $AWS_REGION
              echo "--- Stderr ---"
              aws ssm get-command-invocation --instance-id "$INSTANCE_ID" --command-id "$CMD_ID" --query "StandardErrorContent" --output text --region $AWS_REGION
            fi
            
            [ "$STATUS" = "Success" ]
          }
            
          aws ssm describe-instance-information --region $AWS_REGION
 
          INSTANCES=$(cat instances.json | jq -c '.instances[]')

          for instance in $INSTANCES; do
            NAME=$(echo $instance | jq -r '.name')
            ID=$(echo $instance | jq -r '.instance_id')
            IP=$(echo $instance | jq -r '.server_ip')
            REPO_URL="https://github.com/${{ github.repository }}.git"

            echo "=========================================="
            echo "Deploying to $NAME ($IP)"
            echo "=========================================="

            # Run setup script directly from repo
            PS_COMMAND="Set-Location 'C:\\'; if(Test-Path 'temp'){Remove-Item -Recurse -Force 'temp'}; New-Item -ItemType Directory -Path 'temp' | Out-Null; if(!(Test-Path 'C:\\Program Files\\Git\\bin\\git.exe')){Invoke-WebRequest -Uri 'https://github.com/git-for-windows/git/releases/download/v2.47.1.windows.1/Git-2.47.1-64-bit.exe' -OutFile 'C:\\git.exe' -UseBasicParsing; Start-Process 'C:\\git.exe' -ArgumentList '/VERYSILENT /NORESTART /NOCANCEL /SP-' -Wait; Remove-Item 'C:\\git.exe' -Force}; Set-Location 'temp'; & 'C:\\Program Files\\Git\\bin\\git.exe' clone $REPO_URL project; if(!(Test-Path '.\\project\\setup-production-REPO.ps1')){throw 'clone/setup script missing'}; Set-Location 'project'; .\\setup-production-REPO.ps1; Set-Location 'C:\\'; Remove-Item -Recurse -Force 'temp'"
            PARAMS=$(jq -cn --arg cmd "$PS_COMMAND" '{commands:[$cmd]}')

            DEPLOY_CMD=$(aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunPowerShellScript" \
              --parameters "$PARAMS" \
              --timeout-seconds 600 \
              --output text \
              --query "Command.CommandId" \
              --region $AWS_REGION)

            echo "Deploy command: $DEPLOY_CMD"
            
            if ! wait_for_ssm "$DEPLOY_CMD" "$ID"; then
              echo "[FAIL] Deployment failed for $NAME"
              exit 1
            fi

            echo ""
            echo "[SUCCESS] Deployed to $NAME"
            echo "  API: http://$IP"
            echo ""
          done

          echo "=========================================="
          echo "[SUCCESS] All deployments completed!"
          echo "=========================================="